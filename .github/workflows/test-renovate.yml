name: Test Renovate

on:
  pull_request:
    paths:
      - renovate.json
      - .github/workflows/test-renovate.yml
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .mise.toml
      - name: Test Renovate
        run: bunx --package renovate renovate-config-validator
